name: gpool-app-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - app-prod-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks: [gp_shared]

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: 3000
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:?SWAGGER_ENABLED is required}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:?OTEL_SERVICE_NAME is required}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:?OTEL_EXPORTER_OTLP_ENDPOINT is required}
      OPENBAO_ADDR: ${OPENBAO_ADDR:?OPENBAO_ADDR is required}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: ${OPENBAO_KV_MOUNT:?OPENBAO_KV_MOUNT is required}
      OPENBAO_SECRET_PATH: ${OPENBAO_SECRET_PATH:?OPENBAO_SECRET_PATH is required}
      OPENBAO_REQUIRED_KEYS: ${OPENBAO_REQUIRED_KEYS_API:?OPENBAO_REQUIRED_KEYS_API is required}
      TOLGEE_API_URL: ${TOLGEE_API_URL:-}
      TOLGEE_PROJECT_ID: ${TOLGEE_PROJECT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:?GOOGLE_CALLBACK_URL is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT is required}
      SMTP_SECURE: ${SMTP_SECURE:?SMTP_SECURE is required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "/app/scripts/openbao-run.mjs", "--", "node", "dist/main.js"]
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks: [gp_shared]

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_RELEASE: ${NEXT_PUBLIC_RELEASE:?NEXT_PUBLIC_RELEASE is required}
      OPENBAO_ADDR: ${OPENBAO_ADDR:?OPENBAO_ADDR is required}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: ${OPENBAO_KV_MOUNT:?OPENBAO_KV_MOUNT is required}
      OPENBAO_SECRET_PATH: ${OPENBAO_SECRET_PATH:?OPENBAO_SECRET_PATH is required}
      OPENBAO_REQUIRED_KEYS: ${OPENBAO_REQUIRED_KEYS_WEB:?OPENBAO_REQUIRED_KEYS_WEB is required}
      TOLGEE_API_URL: ${TOLGEE_API_URL:-}
      TOLGEE_PROJECT_ID: ${TOLGEE_PROJECT_ID:-}
    depends_on:
      - api
    command:
      [
        "sh",
        "-lc",
        "until wget -qO- http://api:3000/api/health >/dev/null 2>&1; do sleep 2; done; exec node /app/scripts/openbao-run.mjs -- node apps/ui/server.js",
      ]
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks: [gp_shared]

  alloy:
    image: grafana/alloy:v1.12.0
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - app-prod-alloy-data:/var/lib/alloy/data
    depends_on:
      - api
    networks: [gp_shared]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN:?WEB_DOMAIN is required}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    volumes:
      - ../docker/caddy/Caddyfile.app.prod:/etc/caddy/Caddyfile:ro
      - app-prod-caddy-data:/data
      - app-prod-caddy-config:/config
    depends_on:
      - web
      - api
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks: [gp_shared]

networks:
  gp_shared:
    name: ${GP_SHARED_NETWORK:?GP_SHARED_NETWORK is required}
    external: true

volumes:
  app-prod-pgdata:
  app-prod-alloy-data:
  app-prod-caddy-data:
  app-prod-caddy-config:

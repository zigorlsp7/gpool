name: gpool-app-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: gpool
    volumes:
      - app-local-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks:
      gp_shared:
        aliases:
          - gpool-postgres

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: gpool-postgres
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: gpool
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      TRUST_PROXY: ${TRUST_PROXY:?TRUST_PROXY is required}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:?SWAGGER_ENABLED is required}
      OTEL_SERVICE_NAME: gpool-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: kv
      OPENBAO_SECRET_PATH: gpool
      OPENBAO_REQUIRED_KEYS: AUTH_SESSION_SECRET,GOOGLE_CLIENT_SECRET
      TOLGEE_API_URL: http://tolgee:8080
      TOLGEE_PROJECT_ID: ${TOLGEE_PROJECT_ID:?TOLGEE_PROJECT_ID is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:?GOOGLE_OAUTH_REDIRECT_URI is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      NOTIFICATIONS_KAFKA_BROKERS: ${NOTIFICATIONS_KAFKA_BROKERS:-notifications-redpanda:9092}
      NOTIFICATIONS_EMAIL_TOPIC: ${NOTIFICATIONS_EMAIL_TOPIC:-notification.email.requested.v1}
    ports:
      - "3010:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "/app/scripts/openbao-run.mjs", "--", "node", "dist/main.js"]
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks:
      gp_shared:
        aliases:
          - gpool-api

  web:
    build:
      context: ..
      dockerfile: apps/ui/Dockerfile
      target: local
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
        NEXT_PUBLIC_RELEASE: ${NEXT_PUBLIC_RELEASE:?NEXT_PUBLIC_RELEASE is required}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_RELEASE: ${NEXT_PUBLIC_RELEASE:?NEXT_PUBLIC_RELEASE is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:?GOOGLE_OAUTH_REDIRECT_URI is required}
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:?OPENBAO_TOKEN is required}
      OPENBAO_KV_MOUNT: kv
      OPENBAO_SECRET_PATH: gpool
      OPENBAO_REQUIRED_KEYS: AUTH_SESSION_SECRET,TOLGEE_API_KEY,GOOGLE_CLIENT_SECRET
      TOLGEE_API_URL: http://tolgee:8080
      TOLGEE_PROJECT_ID: ${TOLGEE_PROJECT_ID:?TOLGEE_PROJECT_ID is required}
    ports:
      - "3011:3001"
    depends_on:
      - api
    command:
      [
        "sh",
        "-lc",
        "until wget -qO- http://gpool-api:3000/api/health >/dev/null 2>&1; do sleep 2; done; exec node /app/scripts/openbao-run.mjs -- node apps/ui/server.js",
      ]
    logging:
      driver: "json-file"
      options:
        labels: "com.docker.compose.project,com.docker.compose.service"
    networks: [gp_shared]

  alloy:
    image: grafana/alloy:v1.12.0
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ../docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - app-local-alloy-data:/var/lib/alloy/data
    depends_on:
      - api
    networks: [gp_shared]

networks:
  gp_shared:
    name: platform_ops_shared
    external: true

volumes:
  app-local-pgdata:
  app-local-alloy-data:

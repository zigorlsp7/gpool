name: gpool-precommit

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: gpool_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5433:5432"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: local
    environment:
      NODE_ENV: test
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: gpool_test
      CORS_ORIGINS: http://localhost:3101
      SWAGGER_ENABLED: "true"
      OTEL_SERVICE_NAME: gpool-api-test
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ci-openbao-token
      OPENBAO_KV_MOUNT: kv
      OPENBAO_SECRET_PATH: gpool
      OPENBAO_REQUIRED_KEYS_API: AUTH_SESSION_SECRET,GOOGLE_CLIENT_SECRET,SMTP_PASS
      TOLGEE_API_URL: http://tolgee:8080
      TOLGEE_PROJECT_ID: "3"
      AUTH_SESSION_SECRET: ci-auth-session-secret
      GOOGLE_CLIENT_ID: ci-google-id
      GOOGLE_CLIENT_SECRET: ci-google-secret
      GOOGLE_CALLBACK_URL: http://localhost:3010/api/auth/google/callback
      FRONTEND_URL: http://localhost:3101
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: ci-user
      SMTP_PASS: ci-pass
      SMTP_FROM: ci@gpool.test
    ports:
      - "3010:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/ui/Dockerfile
      target: local
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3010/api
        NEXT_PUBLIC_RELEASE: ci
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3010/api
      NEXT_PUBLIC_RELEASE: ci
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ci-openbao-token
      OPENBAO_KV_MOUNT: kv
      OPENBAO_SECRET_PATH: gpool
      OPENBAO_REQUIRED_KEYS_WEB: TOLGEE_API_KEY,AUTH_SESSION_SECRET
      TOLGEE_API_URL: http://tolgee:8080
      TOLGEE_PROJECT_ID: "3"
      AUTH_SESSION_SECRET: ci-auth-session-secret
    ports:
      - "3101:3001"
    depends_on:
      - api

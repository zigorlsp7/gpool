name: Deploy AWS App (EC2 Compose)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (example: v0.1.0)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-aws-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + Push + Bundle
    runs-on: ubuntu-latest
    environment: production

    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_image: ${{ steps.images.outputs.api_image }}
      web_image: ${{ steps.images.outputs.web_image }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.ref || inputs.release_tag }}

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            raw_tag="${{ github.event.release.tag_name }}"
          else
            raw_tag="${{ inputs.release_tag }}"
          fi

          if [ -z "$raw_tag" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi

          safe_tag="$(printf '%s' "$raw_tag" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')"

          if [ -z "$safe_tag" ]; then
            echo "Release tag '$raw_tag' became empty after sanitization" >&2
            exit 1
          fi

          echo "release_tag=$raw_tag" >> "$GITHUB_OUTPUT"
          echo "image_tag=$safe_tag" >> "$GITHUB_OUTPUT"

      - name: Validate required deploy variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ECR_API_REPOSITORY_URI: ${{ vars.AWS_ECR_API_REPOSITORY_URI }}
          AWS_ECR_WEB_REPOSITORY_URI: ${{ vars.AWS_ECR_WEB_REPOSITORY_URI }}
          AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
          AWS_DEPLOY_INSTANCE_ID: ${{ vars.AWS_DEPLOY_INSTANCE_ID }}
          AWS_SSM_APP_PREFIX: ${{ vars.AWS_SSM_APP_PREFIX }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          required=(
            AWS_REGION
            AWS_ECR_API_REPOSITORY_URI
            AWS_ECR_WEB_REPOSITORY_URI
            AWS_DEPLOY_BUCKET
            AWS_DEPLOY_INSTANCE_ID
            AWS_SSM_APP_PREFIX
            NEXT_PUBLIC_API_URL
          )

          for name in "${required[@]}"; do
            if printenv "$name" >/dev/null; then
              value="$(printenv "$name")"
            else
              value=""
            fi
            if [ -z "$value" ]; then
              echo "Missing GitHub environment variable: $name" >&2
              exit 1
            fi
          done

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build + push API and web images
        id: images
        env:
          API_REPOSITORY: ${{ vars.AWS_ECR_API_REPOSITORY_URI }}
          WEB_REPOSITORY: ${{ vars.AWS_ECR_WEB_REPOSITORY_URI }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          api_image="${API_REPOSITORY}:${IMAGE_TAG}"
          web_image="${WEB_REPOSITORY}:${IMAGE_TAG}"
          api_repo_name="${API_REPOSITORY#*/}"
          web_repo_name="${WEB_REPOSITORY#*/}"

          if aws ecr describe-images --repository-name "$api_repo_name" --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "API image already exists in ECR with immutable tag, reusing: $api_image"
          else
            docker build -f apps/api/Dockerfile --target prod -t "$api_image" .
            docker push "$api_image"
          fi

          if aws ecr describe-images --repository-name "$web_repo_name" --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Web image already exists in ECR with immutable tag, reusing: $web_image"
          else
            docker build \
              --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
              --build-arg NEXT_PUBLIC_RELEASE="$IMAGE_TAG" \
              -f apps/ui/Dockerfile --target prod -t "$web_image" .
            docker push "$web_image"
          fi

          echo "api_image=$api_image" >> "$GITHUB_OUTPUT"
          echo "web_image=$web_image" >> "$GITHUB_OUTPUT"

      - name: Package tracked files into deploy bundle
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          mkdir -p artifacts
          git archive --format=tar.gz --output "artifacts/deploy-bundle-${IMAGE_TAG}.tar.gz" HEAD

      - name: Upload deploy bundle to S3
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
        run: |
          aws s3 cp \
            "artifacts/deploy-bundle-${IMAGE_TAG}.tar.gz" \
            "s3://${DEPLOY_BUCKET}/releases/gpool/${IMAGE_TAG}/deploy-bundle.tar.gz"

  deploy-app:
    name: Remote App Deploy via SSM
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push

    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Execute remote app deploy command
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          INSTANCE_ID: ${{ vars.AWS_DEPLOY_INSTANCE_ID }}
          DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
          APP_SSM_PREFIX: ${{ vars.AWS_SSM_APP_PREFIX }}
          RELEASE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}
        run: |
          payload_file="$(mktemp)"

          jq -n \
            --arg instance "$INSTANCE_ID" \
            --arg region "$AWS_REGION" \
            --arg bucket "$DEPLOY_BUCKET" \
            --arg release "$RELEASE_TAG" \
            --arg api_image "$API_IMAGE" \
            --arg web_image "$WEB_IMAGE" \
            --arg app_prefix "$APP_SSM_PREFIX" \
            '{
              DocumentName: "AWS-RunShellScript",
              InstanceIds: [$instance],
              Parameters: {
                commands: [
                  "set -euo pipefail",
                  "BASE_DIR=\"/opt/gpool\"",
                  "RELEASE_DIR=\"$BASE_DIR/releases/\($release)\"",
                  "mkdir -p \"$BASE_DIR/releases\"",
                  "rm -rf \"$RELEASE_DIR\"",
                  "mkdir -p \"$RELEASE_DIR\"",
                  "aws s3 cp \"s3://\($bucket)/releases/gpool/\($release)/deploy-bundle.tar.gz\" \"/tmp/gpool-\($release).tar.gz\" --region \($region)",
                  "tar -xzf \"/tmp/gpool-\($release).tar.gz\" -C \"$RELEASE_DIR\"",
                  "cd \"$RELEASE_DIR\"",
                  "chmod +x scripts/prod-deploy-remote.sh",
                  "./scripts/prod-deploy-remote.sh --release-dir \"$RELEASE_DIR\" --region \"\($region)\" --app-ssm-prefix \"\($app_prefix)\" --api-image \"\($api_image)\" --web-image \"\($web_image)\" --release-tag \"\($release)\""
                ]
              }
            }' > "$payload_file"

          command_id="$(aws ssm send-command --cli-input-json "file://${payload_file}" --query 'Command.CommandId' --output text)"

          echo "SSM command id: $command_id"

          max_attempts=180
          sleep_seconds=10
          status=""
          status_details=""
          invocation_available="false"

          for attempt in $(seq 1 "$max_attempts"); do
            set +e
            invocation_json="$(aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --output json 2>&1)"
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then
              echo "poll[$attempt/$max_attempts]: invocation not ready yet"
            else
              invocation_available="true"
              status="$(printf '%s' "$invocation_json" | jq -r '.Status')"
              status_details="$(printf '%s' "$invocation_json" | jq -r '.StatusDetails')"
              echo "poll[$attempt/$max_attempts]: status=$status details=$status_details"

              case "$status" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  break
                  ;;
              esac
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep "$sleep_seconds"
            fi
          done

          if [ "$invocation_available" != "true" ]; then
            echo "Unable to read SSM command invocation details (command_id=$command_id)" >&2
            exit 1
          fi

          echo "Command status: $status"
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,ExecutionStartDateTime:ExecutionStartDateTime,ExecutionEndDateTime:ExecutionEndDateTime,StandardOutputUrl:StandardOutputUrl,StandardErrorUrl:StandardErrorUrl}' --output json || true
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          aws ssm get-command-invocation --command-id "$command_id" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true

          if [ "$status" != "Success" ]; then
            echo "Remote app deployment failed (status=$status, status_details=$status_details)" >&2
            exit 1
          fi

  post-deploy-smoke:
    name: Post Deploy Smoke
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-app

    steps:
      - name: Smoke health check
        if: ${{ vars.DEPLOY_HEALTHCHECK_URL != '' }}
        run: |
          curl -fsS "${{ vars.DEPLOY_HEALTHCHECK_URL }}" > /dev/null
          echo "Health check passed: ${{ vars.DEPLOY_HEALTHCHECK_URL }}"

name: Commitlint

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

env:
  HUSKY: '0'

permissions:
  contents: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 20.19.0

      - name: Install commitlint (minimal)
        run: npm install --no-save --no-package-lock @commitlint/cli@20.4.1 @commitlint/config-conventional@20.4.1

      - name: Lint PR title (Conventional Commits)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | npx commitlint --config commitlint.config.js

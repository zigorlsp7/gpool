title = "gpool gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Allow local env files and known placeholder/example values"
paths = [
  '''(^|/)docker/\.env\..*\.local(\..*)?$''',
  '''(^|/)\.env\..*\.local(\..*)?$''',
]
regexes = [
  '''CHANGE_ME_[A-Z0-9_]+''',
  '''REQUIRED_SET_BY_DEPLOY''',
  '''dummy''',
]
